trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  TF_WORKING_DIR: '$(Build.SourcesDirectory)/Terraform-Tasks'

steps:
# Install Terraform
- task: Bash@3
  displayName: 'Install Terraform'
  inputs:
    targetType: 'inline'
    script: |
      sudo apt-get update -y
      sudo apt-get install -y wget unzip
      wget https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      unzip terraform_1.7.5_linux_amd64.zip
      sudo mv terraform /usr/local/bin/
      terraform -version

# Terraform Init
- task: AzureCLI@2
  displayName: 'Terraform Init'
  inputs:
    azureSubscription: 'Terraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd $(TF_WORKING_DIR)
      terraform init

# Terraform Plan
- task: AzureCLI@2
  displayName: 'Terraform Plan'
  inputs:
    azureSubscription: 'Terraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd $(TF_WORKING_DIR)
      terraform plan -out=tfplan -var="ssh_public_key=$(ssh_public_key)"

# Terraform Apply
- task: AzureCLI@2
  displayName: 'Terraform Apply'
  inputs:
    azureSubscription: 'Terraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd $(TF_WORKING_DIR)
      terraform apply -auto-approve tfplan -var="ssh_public_key=$(ssh_public_key)"
