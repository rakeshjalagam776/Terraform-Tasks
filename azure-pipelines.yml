trigger:
- main   # or your branch name

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Azure DevOps Service Connection name
  serviceConnection: 'Terraform'   # replace with your actual service connection name
  # Terraform working directory
  tfWorkingDir: '$(System.DefaultWorkingDirectory)/terraform'

steps:
- task: AzureCLI@2
  displayName: 'Login to Azure'
  inputs:
    azureSubscription: $(Terraform)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Logged in to Azure with service connection"

- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.7.5'   # pick a stable version

- task: TerraformTaskV4@4
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(tfWorkingDir)'

- task: TerraformTaskV4@4
  displayName: 'Terraform Validate'
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(tfWorkingDir)'

- task: TerraformTaskV4@4
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(tfWorkingDir)'
    environmentServiceNameAzureRM: $(Terraform)

- task: TerraformTaskV4@4
  displayName: 'Terraform Apply'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(tfWorkingDir)'
    environmentServiceNameAzureRM: $(Terraform)
    args: '-auto-approve'
