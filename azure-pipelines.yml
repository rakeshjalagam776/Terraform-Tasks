trigger:
- main   # runs pipeline when you push to main branch

pool:
  vmImage: 'ubuntu-latest'

variables:
  TF_WORKING_DIR: '$(Build.SourcesDirectory)/Terraform-Tasks'   # path to your Terraform files

steps:
# Step 1: Install Terraform
- task: TerraformInstaller@0
  inputs:
    terraformVersion: '1.7.5'   # pick a stable version

# Step 2: Initialize Terraform
- task: AzureCLI@2
  inputs:
    azureSubscription: 'Terraform'   # name of your ARM service connection
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd $(TF_WORKING_DIR)
      terraform init

# Step 3: Terraform Plan
- task: AzureCLI@2
  inputs:
    azureSubscription: 'Terraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd $(TF_WORKING_DIR)
      terraform plan -out=tfplan

# Step 4: Terraform Apply
- task: AzureCLI@2
  inputs:
    azureSubscription: 'Terraform'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      cd $(TF_WORKING_DIR)
      terraform apply -auto-approve tfplan
